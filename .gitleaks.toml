title = "Gitleaks config for stellarGive"

[allowlist]
  description = "Global allowlist"
  paths = [
    '''frontend/.env\.example$''',
    '''\.gitleaks\.toml$''',
    '''package-lock\.json$''',
    '''Cargo\.lock$''',
    '''CHANGELOG\.md$''',
  ]

[[rules]]
  id = "stellar-secret-key"
  description = "Stellar secret key (starts with S)"
  regex = '''S[0-9A-Z]{55}'''
  tags = ["key", "stellar"]

[[rules]]
  id = "generic-api-key"
  description = "Generic API key"
  regex = '''(?i)(api[_-]?key|apikey)\s*[:=]\s*['\"]?([A-Za-z0-9\-_]{20,})['\"]?'''
  tags = ["key", "generic"]

[[rules]]
  id = "generic-secret"
  description = "Generic secret value"
  regex = '''(?i)(secret|private[_-]?key|token)\s*[:=]\s*['\"]?([A-Za-z0-9\-_\.]{20,})['\"]?'''
  tags = ["secret", "generic"]
  [rules.allowlist]
    description = "Allow example/placeholder values"
    regexes = [
      '''(?i)example''',
      '''(?i)test''',
      '''(?i)placeholder''',
      '''(?i)xxx''',
      '''(?i)your[-_]?key''',
      '''(?i)fill[-_]?in''',
    ]

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''AKIA[0-9A-Z]{16}'''
  tags = ["key", "aws"]

[[rules]]
  id = "private-key"
  description = "Private key block"
  regex = '''-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'''
  tags = ["key", "private"]
