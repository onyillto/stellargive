name: 🐛 Bug Report
description: Report a bug or unexpected behavior in StellarGive
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as thoroughly as possible to help us resolve it quickly.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What were you trying to do? What is the background or situation that led to this bug?
      placeholder: "e.g. I was trying to donate to a campaign on testnet when..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "e.g. The donate button throws an error after wallet connect..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "e.g. The transaction should be submitted and a success toast should appear."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if available.
      placeholder: "e.g. The page shows a blank screen and console logs: ..."
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements / Constraints
      description: Any specific requirements, environment details, or constraints relevant to this bug.
      placeholder: |
        - Network: Testnet / Mainnet
        - Wallet: Freighter v1.x
        - Browser: Chrome 120
        - OS: Ubuntu 22.04
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What does a fix look like? How do we know this bug is resolved?
      placeholder: |
        - [ ] Donate button submits transaction without error
        - [ ] Success toast is displayed after confirmation
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Logs, screenshots, related issues, or any other context.
    validations:
      required: false
