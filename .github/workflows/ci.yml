name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  change-detection:
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'package.json'
              - 'package-lock.json'
              - '.gitignore'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - '.gitignore'

  rust-and-contract:
    needs: change-detection
    if: ${{ needs.change-detection.outputs.contracts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/stellar-give

      - name: Format check
        working-directory: contracts/stellar-give
        run: cargo fmt --check

      - name: Clippy
        working-directory: contracts/stellar-give
        run: cargo clippy -- -D warnings

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Install Soroban CLI system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Rust Build
        working-directory: contracts/stellar-give
        run: cargo build --locked --target wasm32-unknown-unknown --release

      - name: Rust Test
        working-directory: contracts/stellar-give
        run: cargo test --locked

      - name: Rust Coverage
        working-directory: contracts/stellar-give
        run: cargo tarpaulin --out Xml

      - name: WASM Optimization Check
        run: bash scripts/build-contract.sh

      - name: Codecov Upload (Rust)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v4
        with:
          files: contracts/stellar-give/cobertura.xml
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    needs: change-detection
    if: ${{ needs.change-detection.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.js', 'frontend/src/**/*.jsx', 'frontend/src/**/*.ts', 'frontend/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Accessibility Check
        working-directory: frontend
        run: npm run test:a11y

      - name: Frontend Test and Coverage
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Codecov Upload (Frontend)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build (with Sentry sourcemap upload)
        working-directory: frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: npm run build

      - name: Finalize Sentry release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          npx sentry-cli releases set-commits ${{ github.sha }} --auto
          npx sentry-cli releases finalize ${{ github.sha }}
